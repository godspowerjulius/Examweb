<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - NaijaExams</title>
    
    <!-- Auth, Routes & Guard Scripts (MUST load in this order) -->
    <script src="js/storage.js"></script>
       <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/routes.js"></script>
    <script src="js/guard.js"></script>
    
    <!-- Other scripts -->
    <script src="js/main.js"></script>
    <script src="js/router.js"></script>
    <script src="js/exam-data.js"></script>
    <script src="js/result.js"></script>
    <script src="js/cbt-engine.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/navigation.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">
    
    <!-- Simple Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14 sm:h-16">
                <a href="index.html" class="flex items-center space-x-2">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 bg-gradient-to-br from-indigo-600 to-purple-700 rounded-lg flex items-center justify-center">
                        <i class="fas fa-graduation-cap text-white text-sm sm:text-xl"></i>
                    </div>
                    <span class="text-lg sm:text-xl font-bold text-gray-900">NaijaExams</span>
                </a>
                <div class="flex items-center space-x-2 sm:space-x-4">
                    <span class="text-xs sm:text-sm text-gray-600 hidden sm:inline">Already have an account?</span>
                    <a href="login.html" class="text-indigo-600 font-medium text-xs sm:text-sm hover:underline">Login</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center py-6 sm:py-8 px-4">
        <div class="w-full max-w-md">
            
            <!-- Register Card -->
            <div class="bg-white rounded-2xl shadow-lg p-6 sm:p-8">
                <!-- Header -->
                <div class="text-center mb-5 sm:mb-6">
                    <div class="w-14 h-14 sm:w-16 sm:h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-3 sm:mb-4">
                        <i class="fas fa-user-plus text-indigo-600 text-xl sm:text-2xl"></i>
                    </div>
                    <h1 class="text-xl sm:text-2xl font-bold text-gray-900">Create Your Account</h1>
                    <p class="text-sm text-gray-600 mt-1">Start your exam preparation journey</p>
                </div>

                <!-- Register Form -->
                <form id="registerForm" class="space-y-3 sm:space-y-4">
                    
                    <!-- Full Name -->
                    <div>
                        <label for="fullName" class="form-label text-xs sm:text-sm">Full Name <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-user text-gray-400 text-sm"></i>
                            </div>
                            <input 
                                type="text" 
                                id="fullName" 
                                class="form-input pl-9 sm:pl-10 text-sm"
                                placeholder="Enter your full name"
                                required
                            >
                        </div>
                        <p class="text-red-500 text-xs mt-1 hidden" id="fullNameError"></p>
                    </div>

                    <!-- Username -->
                    <div>
                        <label for="username" class="form-label text-xs sm:text-sm">Username <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-at text-gray-400 text-sm"></i>
                            </div>
                            <input 
                                type="text" 
                                id="username" 
                                class="form-input pl-9 sm:pl-10 text-sm"
                                placeholder="Choose a username"
                                required
                            >
                        </div>
                        <p class="text-red-500 text-xs mt-1 hidden" id="usernameError"></p>
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="form-label text-xs sm:text-sm">Email Address <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-gray-400 text-sm"></i>
                            </div>
                            <input 
                                type="email" 
                                id="email" 
                                class="form-input pl-9 sm:pl-10 text-sm"
                                placeholder="your@email.com"
                                required
                            >
                        </div>
                        <p class="text-red-500 text-xs mt-1 hidden" id="emailError"></p>
                    </div>

                    <!-- Class/Level -->
                    <div>
                        <label for="classLevel" class="form-label text-xs sm:text-sm">Class/Level</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-graduation-cap text-gray-400 text-sm"></i>
                            </div>
                            <select 
                                id="classLevel" 
                                class="form-input pl-9 sm:pl-10 text-sm appearance-none"
                            >
                                <option value="">Select your level</option>
                                <option value="jss1">JSS 1</option>
                                <option value="jss2">JSS 2</option>
                                <option value="jss3">JSS 3</option>
                                <option value="sss1">SSS 1</option>
                                <option value="sss2">SSS 2</option>
                                <option value="sss3">SSS 3</option>
                                <option value="jamb">JAMB Candidate</option>
                                <option value="waec">WAEC Candidate</option>
                                <option value="neco">NECO Candidate</option>
                                <option value="ijmb">IJMB Student</option>
                                <option value="other">Other</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                <i class="fas fa-chevron-down text-gray-400 text-xs"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="form-label text-xs sm:text-sm">Password <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400 text-sm"></i>
                            </div>
                            <input 
                                type="password" 
                                id="password" 
                                class="form-input pl-9 sm:pl-10 pr-10 text-sm"
                                placeholder="Create a password"
                                required
                                minlength="6"
                            >
                            <button 
                                type="button" 
                                id="togglePassword"
                                class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600"
                            >
                                <i class="fas fa-eye text-sm"></i>
                            </button>
                        </div>
                        <p class="text-gray-400 text-xs mt-1">Must be at least 6 characters</p>
                        <p class="text-red-500 text-xs mt-1 hidden" id="passwordError"></p>
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <label for="confirmPassword" class="form-label text-xs sm:text-sm">Confirm Password <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400 text-sm"></i>
                            </div>
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                class="form-input pl-9 sm:pl-10 pr-10 text-sm"
                                placeholder="Confirm your password"
                                required
                            >
                            <button 
                                type="button" 
                                id="toggleConfirmPassword"
                                class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600"
                            >
                                <i class="fas fa-eye text-sm"></i>
                            </button>
                        </div>
                        <p class="text-red-500 text-xs mt-1 hidden" id="confirmPasswordError"></p>
                    </div>

                    <!-- Terms -->
                    <div class="flex items-start">
                        <input 
                            type="checkbox" 
                            id="terms" 
                            class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 mt-0.5"
                            required
                        >
                        <label for="terms" class="ml-2 text-xs text-gray-600">
                            I agree to the <a href="#" class="text-indigo-600 hover:underline">Terms of Service</a> 
                            and <a href="#" class="text-indigo-600 hover:underline">Privacy Policy</a>
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        id="submitBtn"
                        class="w-full btn btn-primary py-3 text-sm sm:text-base"
                    >
                        <span>Create Account</span>
                        <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative my-5 sm:my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-xs">
                        <span class="px-2 bg-white text-gray-500">Or continue with</span>
                    </div>
                </div>

                <!-- Social Login -->
                <div class="grid grid-cols-2 gap-3">
                    <button class="flex items-center justify-center gap-2 border border-gray-300 rounded-lg py-2.5 hover:bg-gray-50 transition">
                        <i class="fab fa-google text-red-500"></i>
                        <span class="text-xs sm:text-sm font-medium">Google</span>
                    </button>
                    <button class="flex items-center justify-center gap-2 border border-gray-300 rounded-lg py-2.5 hover:bg-gray-50 transition">
                        <i class="fab fa-facebook-f text-blue-600"></i>
                        <span class="text-xs sm:text-sm font-medium">Facebook</span>
                    </button>
                </div>

                <!-- Login Link -->
                <p class="text-center text-gray-600 mt-5 sm:mt-6 text-xs sm:text-sm">
                    Already have an account? 
                    <a href="login.html" class="text-indigo-600 font-medium hover:underline">Login here</a>
                </p>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
        
        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('confirmPassword');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
        
        // Form submission
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            document.addEventListener('DOMContentLoaded', () => {
    const registerForm = document.getElementById('registerForm');
    
    if (registerForm) {
        registerForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect data from the form
            const userData = {
                fullName: this.fullName.value,
                username: this.username.value,
                email: this.email.value,
                password: this.password.value,
                level: this.classLevel.value
            };

            // Call the function from your auth.js
            const result = registerUser(userData);

            if (result.success) {
                showToast("Registration Successful! Redirecting to login...", "success");
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                showToast(result.message, "error");
            }
        });
    }
});
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const classLevel = document.getElementById('classLevel').value;
            
            // Clear errors
            document.querySelectorAll('[id$="Error"]').forEach(el => {
                el.classList.add('hidden');
                el.textContent = '';
            });
            
            let hasError = false;
            
            // Validation
            if (fullName.length < 3) {
                document.getElementById('fullNameError').textContent = 'Full name must be at least 3 characters';
                document.getElementById('fullNameError').classList.remove('hidden');
                hasError = true;
            }
            
            if (username.length < 3) {
                document.getElementById('usernameError').textContent = 'Username must be at least 3 characters';
                document.getElementById('usernameError').classList.remove('hidden');
                hasError = true;
            }
            
            if (!validateEmail(email)) {
                document.getElementById('emailError').textContent = 'Please enter a valid email';
                document.getElementById('emailError').classList.remove('hidden');
                hasError = true;
            }
            
            if (password.length < 6) {
                document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
                document.getElementById('passwordError').classList.remove('hidden');
                hasError = true;
            }
            
            if (password !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
                document.getElementById('confirmPasswordError').classList.remove('hidden');
                hasError = true;
            }
            
            if (hasError) return;
            
            // Check if user exists
            const users = getFromStorage('naijaexams_users', []);
            
            if (users.find(u => u.username === username)) {
                document.getElementById('usernameError').textContent = 'Username already taken';
                document.getElementById('usernameError').classList.remove('hidden');
                return;
            }
            
            if (users.find(u => u.email === email)) {
                document.getElementById('emailError').textContent = 'Email already registered';
                document.getElementById('emailError').classList.remove('hidden');
                return;
            }
            
            // Create user
            const newUser = {
                fullName,
                username,
                email,
                password,
                classLevel,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            saveToStorage('naijaexams_users', users);
            
            showToast('Registration successful! Please login.', 'success');
            setTimeout(() => window.location.href = 'login.html', 1500);
        });
        document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = {
        fullName: this.fullName.value,
        username: this.username.value,
        email: this.email.value,
        password: this.password.value,
        level: this.classLevel.value
    };

    const result = registerUser(formData);
    if (result.success) {
        showToast("Registration Successful!", "success");
        setTimeout(() => window.location.href = 'login.html', 2000);
    } else {
        showToast(result.message, "error");
    }
});
    </script>
</body>
</html>
