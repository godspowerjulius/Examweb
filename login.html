<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - NaijaExams</title>
    
    <!-- Auth, Routes & Guard Scripts (MUST load in this order) -->
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/routes.js"></script>
    <script src="js/guard.js"></script>
    
    <!-- Other scripts -->
    <script src="js/main.js"></script>
    <script src="js/router.js"></script>
    <script src="js/exam-data.js"></script>
    <script src="js/result.js"></script>
    <script src="js/cbt-engine.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/navigation.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">
    
    <!-- Simple Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14 sm:h-16">
                <a href="index.html" class="flex items-center space-x-2">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 bg-gradient-to-br from-indigo-600 to-purple-700 rounded-lg flex items-center justify-center">
                        <i class="fas fa-graduation-cap text-white text-sm sm:text-xl"></i>
                    </div>
                    <span class="text-lg sm:text-xl font-bold text-gray-900">NaijaExams</span>
                </a>
                <div class="flex items-center space-x-2 sm:space-x-4">
                    <span class="text-xs sm:text-sm text-gray-600 hidden sm:inline">Don't have an account?</span>
                    <a href="register.html" class="text-indigo-600 font-medium text-xs sm:text-sm hover:underline">Register</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center py-8 sm:py-12 px-4">
        <div class="w-full max-w-md">
            
            <!-- Login Card -->
            <div class="bg-white rounded-2xl shadow-lg p-6 sm:p-8">
                <!-- Header -->
                <div class="text-center mb-6 sm:mb-8">
                    <div class="w-14 h-14 sm:w-16 sm:h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-3 sm:mb-4">
                        <i class="fas fa-sign-in-alt text-indigo-600 text-xl sm:text-2xl"></i>
                    </div>
                    <h1 class="text-xl sm:text-2xl font-bold text-gray-900">Welcome Back!</h1>
                    <p class="text-sm text-gray-600 mt-1">Login to continue your exam preparation</p>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="space-y-4 sm:space-y-5">
                    
                    <!-- Username/Email -->
                    <div>
                        <label for="loginInput" class="form-label text-xs sm:text-sm">Username or Email <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-user text-gray-400 text-sm"></i>
                            </div>
                            <input 
                                type="text" 
                                id="loginInput" 
                                class="form-input pl-9 sm:pl-10 text-sm"
                                placeholder="Enter username or email"
                                required
                            >
                        </div>
                        <p class="text-red-500 text-xs mt-1 hidden" id="loginInputError"></p>
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="form-label text-xs sm:text-sm">Password <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400 text-sm"></i>
                            </div>
                            <input 
                                type="password" 
                                id="password" 
                                class="form-input pl-9 sm:pl-10 pr-10 text-sm"
                                placeholder="Enter your password"
                                required
                            >
                            <button 
                                type="button" 
                                id="togglePassword"
                                class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600"
                            >
                                <i class="fas fa-eye text-sm"></i>
                            </button>
                        </div>
                        <p class="text-red-500 text-xs mt-1 hidden" id="passwordError"></p>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox" id="rememberMe" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                            <span class="ml-2 text-xs sm:text-sm text-gray-600">Remember me</span>
                        </label>
                        <a href="#" class="text-xs sm:text-sm text-indigo-600 hover:underline">Forgot password?</a>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        id="submitBtn"
                        class="w-full btn btn-primary py-3 text-sm sm:text-base"
                    >
                        <span>Login</span>
                        <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative my-5 sm:my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-xs">
                        <span class="px-2 bg-white text-gray-500">Or continue with</span>
                    </div>
                </div>

                <!-- Social Login -->
                <div class="grid grid-cols-2 gap-3">
                    <button class="flex items-center justify-center gap-2 border border-gray-300 rounded-lg py-2.5 hover:bg-gray-50 transition">
                        <i class="fab fa-google text-red-500"></i>
                        <span class="text-xs sm:text-sm font-medium">Google</span>
                    </button>
                    <button class="flex items-center justify-center gap-2 border border-gray-300 rounded-lg py-2.5 hover:bg-gray-50 transition">
                        <i class="fab fa-facebook-f text-blue-600"></i>
                        <span class="text-xs sm:text-sm font-medium">Facebook</span>
                    </button>
                </div>

                <!-- Register Link -->
                <p class="text-center text-gray-600 mt-5 sm:mt-6 text-xs sm:text-sm">
                    Don't have an account? 
                    <a href="register.html" class="text-indigo-600 font-medium hover:underline">Register here</a>
                </p>
            </div>

            <!-- Demo Credentials -->
            <div class="mt-4 bg-blue-50 rounded-xl p-3 sm:p-4 border border-blue-100">
                <div class="flex items-start gap-2 sm:gap-3">
                    <i class="fas fa-info-circle text-blue-500 mt-0.5 text-sm"></i>
                    <div>
                        <p class="text-xs sm:text-sm font-medium text-blue-800">Demo Credentials</p>
                        <p class="text-xs text-blue-600 mt-0.5">
                            Username: <strong>demo</strong> or <strong>demo@example.com</strong><br>
                            Password: <strong>password123</strong>
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
        
        // Form submission
        document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.getElementById('loginForm');

    if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = this.username.value;
            const password = this.password.value;

            // Call the login function from auth.js
            const result = loginUser(username, password);

            if (result.success) {
                showToast("Login Successful! Welcome back.", "success");
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                showToast(result.message, "error");
            }
        });
    }
});

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const loginInput = document.getElementById('loginInput').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            // Clear errors
            document.querySelectorAll('[id$="Error"]').forEach(el => el.classList.add('hidden'));
            
            // Demo login
            if ((loginInput === 'demo' || loginInput === 'demo@example.com') && password === 'password123') {
                const user = {
                    fullName: 'Demo Student',
                    username: 'demo',
                    email: 'demo@example.com',
                    classLevel: 'sss3'
                };
                saveToStorage('naijaexams_user', user);
                showToast('Login successful!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } else {
                // Check stored users
                const users = getFromStorage('naijaexams_users', []);
                const user = users.find(u => (u.username === loginInput || u.email === loginInput) && u.password === password);
                
                if (user) {
                    const userForStorage = { ...user };
                    delete userForStorage.password;
                    saveToStorage('naijaexams_user', userForStorage);
                    showToast('Login successful!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    showToast('Invalid credentials', 'error');
                }
            }
        });
        document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = {
        fullName: this.fullName.value,
        username: this.username.value,
        email: this.email.value,
        password: this.password.value,
        level: this.classLevel.value
    };

    const result = registerUser(formData);
    if (result.success) {
        showToast("Registration Successful!", "success");
        setTimeout(() => window.location.href = 'login.html', 2000);
    } else {
        showToast(result.message, "error");
    }
});
    </script>
</body>
</html>
