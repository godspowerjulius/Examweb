<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home - NaijaExams</title>
    
    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/navigation.js"></script>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 font-sans text-gray-800">
    
    <!-- Navigation Bar -->
    <nav class="bg-white shadow sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14 sm:h-16">
                
                <!-- Logo -->
                <a href="index.html" class="flex items-center space-x-2">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 bg-gradient-to-br from-indigo-600 to-purple-700 rounded-lg flex items-center justify-center">
                        <i class="fas fa-graduation-cap text-white text-sm sm:text-lg"></i>
                    </div>
                    <span class="text-lg sm:text-xl font-bold text-gray-900">NaijaExams</span>
                </a>

                <!-- Desktop Navigation -->
                <div class="hidden md:flex items-center space-x-6 lg:space-x-8">
                    <a href="index.html" data-nav-link class="text-gray-700 hover:text-indigo-600 transition text-sm">Home</a>
                    <a href="dashboard.html" data-nav-link data-protected-link class="text-gray-700 hover:text-indigo-600 transition text-sm">Dashboard</a>
                    <a href="profile.html" data-nav-link data-protected-link class="text-gray-700 hover:text-indigo-600 transition text-sm">Profile</a>

                    <!-- Guest Only -->
                    <div data-guest-only class="flex items-center space-x-3">
                        <a href="login.html" class="text-gray-700 hover:text-indigo-600 transition text-sm font-medium">Login</a>
                        <a href="register.html" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition text-sm font-medium">Register</a>
                    </div>

                    <!-- User Only -->
                    <div data-user-only class="hidden flex items-center space-x-4">
                        <span class="text-sm text-gray-700">Welcome, <span data-username>User</span>!</span>
                        <button data-logout class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition text-sm font-medium">Logout</button>
                    </div>
                </div>

                <!-- Mobile Menu Button -->
                <button id="mobileMenuBtn" class="md:hidden text-2xl text-gray-700 hover:text-indigo-600">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Navigation Menu -->
        <div id="mobileMenu" class="hidden md:hidden bg-white border-t border-gray-200">
            <div class="px-4 py-4 space-y-3">
                <a href="index.html" data-nav-link class="block px-3 py-2 text-gray-700 hover:bg-indigo-50 rounded-lg transition">Home</a>
                <a href="dashboard.html" data-nav-link data-protected-link class="block px-3 py-2 text-gray-700 hover:bg-indigo-50 rounded-lg transition">Dashboard</a>
                <a href="profile.html" data-nav-link data-protected-link class="block px-3 py-2 text-gray-700 hover:bg-indigo-50 rounded-lg transition">Profile</a>

                <hr class="my-3">

                <!-- Mobile Guest Only -->
                <div data-guest-only class="space-y-2">
                    <a href="login.html" class="block px-3 py-2 text-gray-700 hover:bg-indigo-50 rounded-lg transition font-medium">Login</a>
                    <a href="register.html" class="block px-3 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium text-center">Register</a>
                </div>

                <!-- Mobile User Only -->
                <div data-user-only class="hidden space-y-2 border-t pt-3">
                    <p class="px-3 py-2 text-sm text-gray-700">Welcome, <span data-username>User</span>!</p>
                    <button data-logout class="w-full px-3 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium text-center">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="text-center">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">Welcome to NaijaExams</h1>
            <p class="text-xl text-gray-600 mb-8">Your gateway to exam success in Nigeria</p>
            
            <div data-guest-only class="space-y-4">
                <p class="text-gray-700 mb-6">Get started with your exam preparation</p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <a href="register.html" class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition font-semibold">Register Now</a>
                    <a href="login.html" class="bg-white border-2 border-indigo-600 text-indigo-600 px-8 py-3 rounded-lg hover:bg-indigo-50 transition font-semibold">Login</a>
                </div>
            </div>

            <div data-user-only class="hidden">
                <a href="dashboard.html" class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition font-semibold inline-block">Go to Dashboard</a>
            </div>
        </div>
    </main>

</body>
</html>
